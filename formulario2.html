<form action="/action_page.html">
<fieldset>
<legend>Gestão de ingressos</legend>
<form>
<label for="login">Login:</label><br>
<input type="text" id="login" name="login"><br>
<label for="senha">Senha:</label><br>
<input type="text" id="senha" name="senha"><br>

<label for="status">Status</label>
<select name="status" id="status">
<option value="inativo">Inativo</option>
<option value="Ativo">Ativo</option>
</select>

<p>Escolha sua experiência:</p>
<input type="radio" id="normal" name="experiencia" value="normal">
<label for="normal">Normal</label><br>
<input type="radio" id="pista" name="experiencia" value="pista">
<label for="pista">Pista</label><br>
<input type="radio" id="VIP" name="experiencia" value="VIP">
<label for="VIP">VIP</label>

<p>Data do show:</p>
<input type:="date">

<p>Escolha o formato:</p>
<input type="radio" id="fisico" name="experiencia" value="fisico">
<label for="fisico">Físico</label><br>
<input type="radio" id="code" name="experiencia" value="code">
<label for="code">QR code</label><br>

<label for="observacoes">Observações:</label><br>
<textarea id="observacoes" name="observacoes" rows="4" cols="50">
A ordem de entrada será dada pela ordem de chegada na fila no dia do evento.
</textarea>

<p>Escolha seus horários:</p>
<input type="checkbox" id="horario1" name="horario" value="tarde1">
<label for="horario1"> 16:00</label><br>
<input type="checkbox" id="horario2" name="horario2" value="tarde2">
<label for="horario2"> 18:00</label><br>
<input type="checkbox" id="horario3" name="horario3" value="noite">
<label for="horario3"> 20:00</label><br>

<button>Salvar</button>
<button>Excluir</button>

</form>
</fieldset>
</form>
